<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a0f"/>

  <!-- Owl head: rounded top -->
  <ellipse cx="16" cy="15" rx="9" ry="10" fill="#1a1a24"/>

  <!-- Ear tufts -->
  <polygon points="10,7 8,2 12,6" fill="#d4a843"/>
  <polygon points="22,7 24,2 20,6" fill="#d4a843"/>

  <!-- Left eye outer ring -->
  <circle cx="12" cy="14" r="4" fill="#d4a843"/>
  <!-- Left eye inner -->
  <circle cx="12" cy="14" r="2.4" fill="#0a0a0f"/>
  <!-- Left eye pupil shine -->
  <circle cx="12.8" cy="13.2" r="0.7" fill="#d4a843"/>

  <!-- Right eye outer ring -->
  <circle cx="20" cy="14" r="4" fill="#d4a843"/>
  <!-- Right eye inner -->
  <circle cx="20" cy="14" r="2.4" fill="#0a0a0f"/>
  <!-- Right eye pupil shine -->
  <circle cx="20.8" cy="13.2" r="0.7" fill="#d4a843"/>

  <!-- Beak -->
  <polygon points="16,17 14.2,20 17.8,20" fill="#d4a843"/>

  <!-- Chest bar / perch line suggestion -->
  <rect x="7" y="23" width="18" height="2" rx="1" fill="#d4a843" opacity="0.5"/>
</svg>
