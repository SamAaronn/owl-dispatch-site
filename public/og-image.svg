<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <!-- Radial glow behind owl -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for text -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c46a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8882e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#d4a843" opacity="0.8"/>
  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#d4a843" opacity="0.8"/>

  <!-- Left border accent -->
  <rect x="0" y="0" width="3" height="630" fill="#d4a843" opacity="0.3"/>
  <!-- Right border accent -->
  <rect x="1197" y="0" width="3" height="630" fill="#d4a843" opacity="0.3"/>

  <!-- OWL MARK (centered, large) -->
  <g transform="translate(500, 90) scale(6.5)">
    <!-- Owl head -->
    <ellipse cx="16" cy="15" rx="9" ry="10" fill="#1a1a24"/>

    <!-- Ear tufts -->
    <polygon points="10,7 8,2 12,6" fill="#d4a843"/>
    <polygon points="22,7 24,2 20,6" fill="#d4a843"/>

    <!-- Left eye outer ring -->
    <circle cx="12" cy="14" r="4" fill="#d4a843"/>
    <circle cx="12" cy="14" r="2.4" fill="#0a0a0f"/>
    <circle cx="12.8" cy="13.2" r="0.7" fill="#d4a843"/>

    <!-- Right eye outer ring -->
    <circle cx="20" cy="14" r="4" fill="#d4a843"/>
    <circle cx="20" cy="14" r="2.4" fill="#0a0a0f"/>
    <circle cx="20.8" cy="13.2" r="0.7" fill="#d4a843"/>

    <!-- Beak -->
    <polygon points="16,17 14.2,20 17.8,20" fill="#d4a843"/>

    <!-- Perch line -->
    <rect x="7" y="23" width="18" height="2" rx="1" fill="#d4a843" opacity="0.5"/>
  </g>

  <!-- Brand name: OWL DISPATCH -->
  <text
    x="600"
    y="430"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="88"
    font-weight="700"
    letter-spacing="6"
    text-anchor="middle"
    fill="url(#goldGrad)"
  >OWL DISPATCH</text>

  <!-- Divider line -->
  <rect x="400" y="455" width="400" height="1.5" fill="#d4a843" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="600"
    y="510"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.65"
  >AI NIGHT-SHIFT DISPATCH FOR TOWING</text>

  <!-- URL badge -->
  <rect x="480" y="545" width="240" height="36" rx="18" fill="#d4a843" opacity="0.12" stroke="#d4a843" stroke-width="1" stroke-opacity="0.3"/>
  <text
    x="600"
    y="568"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="17"
    font-weight="500"
    letter-spacing="1"
    text-anchor="middle"
    fill="#d4a843"
    opacity="0.85"
  >owldispatch.com</text>
</svg>
